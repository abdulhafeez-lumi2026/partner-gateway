server:
  port: 9998
  compression:
    enabled: true
  shutdown: graceful

spring:
  application:
    name: lumi-core-partner-gateway
  lifecycle:
    timeout-per-shutdown-phase: 30s
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
jwt:
  secret: ${JWT_SECRET:lumi-partner-jwt-secret-key-that-is-at-least-256-bits-long-for-hmac-sha256}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000
  okhttp:
    enabled: true

# Service URLs — k8s service DNS as defaults, override with env vars for local dev
api:
  booking:
    baseUrl: ${BOOKING_SERVICE_URL:http://lumi-ultra-booking-service.backend.svc}
  driver:
    baseUrl: ${DRIVER_SERVICE_URL:http://lumi-ultra-driver-service.backend.svc}
  branch:
    baseUrl: ${BRANCH_SERVICE_URL:http://lumi-ultra-branch-service.backend.svc}
  fleet:
    baseUrl: ${FLEET_SERVICE_URL:http://lumi-core-fleet-service.core.svc.cluster.local}
  fleet-legacy:
    baseUrl: ${FLEET_LEGACY_SERVICE_URL:http://lumi-ultra-fleet-service.backend.svc}
  partner:
    baseUrl: ${PARTNER_SERVICE_URL:http://lumi-core-partner-service.core.svc.cluster.local}
  core-booking:
    baseUrl: ${CORE_BOOKING_SERVICE_URL:http://lumi-core-booking-service.core.svc.cluster.local}
