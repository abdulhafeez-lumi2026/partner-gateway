server:
  port: 9998
  compression:
    enabled: true
  shutdown: graceful

spring:
  application:
    name: lumi-core-partner-gateway
  lifecycle:
    timeout-per-shutdown-phase: 30s
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
jwt:
  secret: ${JWT_SECRET:lumi-partner-jwt-secret-key-that-is-at-least-256-bits-long-for-hmac-sha256}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000
  okhttp:
    enabled: true

# Service URLs — defaults point to preprod for downstream, local for partner services
api:
  booking:
    baseUrl: ${BOOKING_SERVICE_URL:https://api-preprod.lumirental.com/booking-service}
  driver:
    baseUrl: ${DRIVER_SERVICE_URL:https://api-preprod.lumirental.com/driver-service}
  branch:
    baseUrl: ${BRANCH_SERVICE_URL:https://api-preprod.lumirental.com/branch-service}
  fleet:
    baseUrl: ${FLEET_SERVICE_URL:https://api-preprod.lumirental.com/core-fleet-service}
  fleet-legacy:
    baseUrl: ${FLEET_LEGACY_SERVICE_URL:https://api-preprod.lumirental.com/fleet-service}
  partner:
    baseUrl: ${PARTNER_SERVICE_URL:http://localhost:9997}
  core-booking:
    baseUrl: ${CORE_BOOKING_SERVICE_URL:http://localhost:9996}
